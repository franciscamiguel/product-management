<h2 mat-dialog-title>{{ isEditMode ? 'Editar Produto' : 'Criar Produto' }}</h2>

<div mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <label>
      Nome
      <input type="text" formControlName="name" />
    </label>

    <label>
      SKU
      <input type="text" formControlName="sku" />
    </label>

    <label class="full">
      Descrição
      <textarea rows="3" formControlName="description"></textarea>
    </label>

    <label>
      Preço
      <input type="number" step="0.01" formControlName="price" />
    </label>

    <label>
      Estoque
      <input type="number" formControlName="stockQuantity" />
    </label>

    <label>
      Categoria
      <input type="text" formControlName="category" />
    </label>

    <label>
      Status
      <select formControlName="status">
        @for (status of statusOptions; track status) {
          <option [value]="status">{{ status }}</option>
        }
      </select>
    </label>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="close()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()">Salvar</button>
</div>
